name: CreditCardArchive
options:
  deploymentTarget:
    iOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    PRODUCT_BUNDLE_IDENTIFIER: cn.creditcard.archive
    MARKETING_VERSION: "0.3.0"
    CURRENT_PROJECT_VERSION: "6"
    TARGETED_DEVICE_FAMILY: "1,2"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
    DEVELOPMENT_TEAM: ""
    PROVISIONING_PROFILE_SPECIFIER: ""
targets:
  CreditCardArchive:
    type: application
    platform: iOS
    sources:
      - CreditCardArchive/AppDelegate.swift
      - CreditCardArchive/WebViewController.swift
    resources:
      - CreditCardArchive/Assets.xcassets
    info:
      path: CreditCardArchive/Info.plist
