<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>信用卡档案</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <script>
      window.APP_BUILD = "2026-06-05-1740";
      const style = document.createElement("link");
      style.rel = "stylesheet";
      style.href = `./styles.css?build=${window.APP_BUILD}`;
      document.head.appendChild(style);
    </script>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <h1>信用卡档案</h1>
          <p id="todayText">本机档案，不保存完整卡号</p>
        </div>
        <button class="primary-btn" id="addCardBtn" type="button">
          <span aria-hidden="true">＋</span>
          新增卡片
        </button>
      </header>

      <nav class="tabs" aria-label="主要视图">
        <button class="tab active" data-view="cards" type="button">档案</button>
        <button class="tab" data-view="reminders" type="button">提醒</button>
        <button class="tab" data-view="usage" type="button">用卡</button>
        <button class="tab" data-view="campaigns" type="button">活动</button>
        <button class="tab" data-view="data" type="button">数据</button>
      </nav>

      <main>
        <section class="summary-strip" id="summaryStrip"></section>

        <section class="recommendation" id="recommendationCard"></section>

        <section class="toolbar" aria-label="筛选工具">
          <label class="search-box">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="搜索银行、卡名、尾号、用途、备注" />
          </label>
          <select id="statusFilter" aria-label="按状态筛选">
            <option value="all">全部状态</option>
            <option value="正常">正常</option>
            <option value="备用">备用</option>
            <option value="冻结">冻结</option>
            <option value="已换卡">已换卡</option>
            <option value="已注销">已注销</option>
          </select>
          <select id="sortMode" aria-label="排序方式">
            <option value="best">智能排序</option>
            <option value="statementBest">按账单日推荐用卡</option>
            <option value="statement">按账单日</option>
            <option value="payment">按还款日</option>
            <option value="creditLimit">按信用额度</option>
            <option value="cashback">筛选返利卡</option>
            <option value="annualFee">按年费日</option>
            <option value="bank">按银行</option>
          </select>
        </section>

        <section class="quick-views" aria-label="快捷视图">
          <button class="quick-view" data-sort="statementBest" type="button">账单日推荐用卡</button>
          <button class="quick-view" data-sort="payment" type="button">还款日资金安排</button>
          <button class="quick-view" data-sort="creditLimit" type="button">额度从高到低</button>
          <button class="quick-view" data-sort="cashback" type="button">只看返利卡</button>
        </section>

        <section class="view active" id="cardsView">
          <div class="section-head">
            <h2>卡片档案</h2>
            <span id="cardCount">0 张</span>
          </div>
          <div class="card-grid" id="cardList"></div>
        </section>

        <section class="view" id="remindersView">
          <div class="section-head">
            <h2>期限提醒</h2>
            <span>还款、年费、活动、换卡</span>
          </div>
          <div class="timeline" id="remindersList"></div>
        </section>

        <section class="view" id="usageView">
          <div class="section-head">
            <h2>使用卡片</h2>
            <span>按需求重新展示档案</span>
          </div>
          <div class="scenario-grid" id="scenarioList"></div>
        </section>

        <section class="view" id="campaignsView">
          <div class="section-head">
            <h2>活动档案</h2>
            <button class="ghost-btn" id="addCampaignBtn" type="button">新增活动</button>
          </div>
          <div class="campaign-list" id="campaignList"></div>
        </section>

        <section class="view" id="dataView">
          <div class="section-head">
            <h2>数据备份</h2>
            <span>导出后可迁移到数据库或 App</span>
          </div>
          <div class="data-panel">
            <button class="primary-btn" id="exportBtn" type="button">导出 JSON</button>
            <label class="file-btn">
              导入 JSON
              <input id="importInput" type="file" accept="application/json" />
            </label>
            <button class="ghost-btn danger" id="resetBtn" type="button">恢复示例数据</button>
            <textarea id="dataPreview" readonly spellcheck="false"></textarea>
          </div>
        </section>
      </main>
    </div>

    <dialog id="cardDialog">
      <form method="dialog" class="dialog-form" id="cardForm">
        <div class="dialog-head">
          <h2 id="cardDialogTitle">新增卡片</h2>
          <button class="icon-btn" value="cancel" type="submit" aria-label="关闭">×</button>
        </div>
        <input type="hidden" id="cardId" />
        <div class="form-grid">
          <label>银行<input id="bank" required list="bankOptions" placeholder="搜索或自定义银行" /></label>
          <label>卡名称<input id="cardName" required placeholder="例如 Visa 无限卡" /></label>
          <label>卡组织
            <select id="network">
              <option>Visa</option>
              <option>Mastercard</option>
              <option>Amex</option>
              <option>银联</option>
              <option>JCB</option>
              <option>其他</option>
            </select>
          </label>
          <label>消费/结算货币<input id="spendingCurrency" list="spendingCurrencyOptions" placeholder="人民币 / 美元 / 全币种 / 多币种" /></label>
          <label>尾号<input id="last4" maxlength="4" inputmode="numeric" placeholder="只填4位" /></label>
          <label>持卡人<input id="holder" list="holderOptions" placeholder="默认本人，可自定义" /></label>
          <label>状态
            <select id="status">
              <option>正常</option>
              <option>备用</option>
              <option>冻结</option>
              <option>已换卡</option>
              <option>已注销</option>
            </select>
          </label>
          <label>账单日<input id="statementDay" type="number" min="1" max="31" placeholder="每月几号" /></label>
          <label>还款日<input id="paymentDay" type="number" min="1" max="31" placeholder="每月几号" /></label>
          <label>年费日<input id="annualFeeDay" type="date" /></label>
          <label>年费规则
            <select id="annualFeeRule">
              <option>终身免年费</option>
              <option>消费达标免</option>
              <option>首年免年费</option>
              <option>需要手动处理</option>
              <option>未知待确认</option>
            </select>
          </label>
          <label class="wide">适合用途<input id="useTags" placeholder="勾选常用项，也可手工补充" /></label>
          <div class="wide check-grid" data-target="useTags">
            <label><input type="checkbox" value="大额" />大额</label>
            <label><input type="checkbox" value="最长还款" />最长还款</label>
            <label><input type="checkbox" value="返利" />返利</label>
            <label><input type="checkbox" value="里程" />里程</label>
            <label><input type="checkbox" value="境外" />境外</label>
            <label><input type="checkbox" value="网购" />网购</label>
            <label><input type="checkbox" value="餐饮" />餐饮</label>
            <label><input type="checkbox" value="酒店" />酒店</label>
            <label><input type="checkbox" value="机票" />机票</label>
            <label><input type="checkbox" value="加油" />加油</label>
            <label><input type="checkbox" value="超市" />超市</label>
          </div>
          <label class="wide">不适合用途<input id="avoidTags" placeholder="例如 不适合境外, 不适合大额" /></label>
          <label class="wide">绑定服务备注<textarea id="bindings" placeholder="例如 Apple订阅、保险、云服务，只写服务名和提醒"></textarea></label>
          <label class="wide">新旧卡关联<textarea id="replacement" placeholder="例如 旧卡尾号1234，盗刷后换卡，旧卡可能仍有退款"></textarea></label>
          <label class="wide">备注<textarea id="notes" placeholder="额度备注、特殊规则、退款/争议线索"></textarea></label>
        </div>

        <details class="field-group">
          <summary>生命周期 / 额度 / 年费</summary>
          <div class="form-grid">
            <label>账户类型
              <select id="accountType">
                <option>个人卡</option>
                <option>商务卡</option>
                <option>公司卡</option>
                <option>副卡</option>
                <option>其他</option>
              </select>
            </label>
            <label>卡等级<input id="cardLevel" list="cardLevelOptions" placeholder="选择或自定义等级" /></label>
            <label>开卡日期<input id="openDate" type="date" /></label>
            <label>批卡日期<input id="approvalDate" type="date" /></label>
            <label>销卡/降级日期<input id="closeDate" type="date" /></label>
            <label>计划提醒日期<input id="actionBeforeDate" type="date" /></label>
            <label>年费金额<input id="annualFeeAmount" inputmode="decimal" placeholder="例如 680 / 550 USD" /></label>
            <label>首年年费
              <select id="firstYearFee">
                <option>未知</option>
                <option>首年免</option>
                <option>首年收</option>
                <option>首年达标免</option>
              </select>
            </label>
            <label>额度<input id="creditLimit" inputmode="decimal" placeholder="例如 50000" /></label>
            <label>额度币种<input id="currency" list="currencyOptions" placeholder="CNY / USD / HKD" /></label>
            <label class="wide">保留/降级/销卡计划<textarea id="cardActionPlan" placeholder="例如 年费入账后问挽留；权益用完后降级；保留因为终免"></textarea></label>
            <label class="wide">挽留 offer / 年费处理记录<textarea id="retentionOffer" placeholder="例如 2026-06 客服给200返现；需消费3000"></textarea></label>
          </div>
        </details>

        <details class="field-group">
          <summary>积分 / 开卡奖励 / 消费策略</summary>
          <div class="form-grid">
            <label>积分/里程体系<input id="rewardProgram" placeholder="例如 招行积分 / Avios / MR / UR" /></label>
            <label>奖励类型
              <select id="rewardType">
                <option>未知</option>
                <option>直接返利</option>
                <option>现金返现</option>
                <option>银行积分</option>
                <option>航空里程</option>
                <option>酒店积分</option>
                <option>混合权益</option>
              </select>
            </label>
            <label>当前积分备注<input id="pointsBalanceNote" placeholder="例如 约8万分，月底查" /></label>
            <label>积分到期规则<input id="pointsExpiryRule" placeholder="例如 24个月 / 不过期 / 需活动" /></label>
            <label>返利类型<input id="cashbackType" list="cashbackTypeOptions" placeholder="现金返利 / 消费返现 / 里程等价" /></label>
            <label>返利比例/价值<input id="cashbackRate" placeholder="例如 1.5% / 5x / 每里程约0.08" /></label>
            <label>开卡奖励<input id="signupBonus" placeholder="例如 8万分 / 500返现" /></label>
            <label>奖励入账日期<input id="bonusReceivedDate" type="date" /></label>
            <label>最低消费要求<input id="msrAmount" inputmode="decimal" placeholder="例如 3个月刷8000" /></label>
            <label>最低消费截止<input id="msrDeadline" type="date" /></label>
            <label>最低消费进度<input id="msrProgress" inputmode="decimal" placeholder="例如 已刷3200/8000" /></label>
            <label>推荐链接/上限<input id="referralInfo" placeholder="例如 每年上限10万分" /></label>
            <label class="wide">积分规则 / 倍数<textarea id="earnRules" placeholder="例如 餐饮3x，酒店5x，其他1x；指定渠道才有返现"></textarea></label>
            <label class="wide">不积分 / 排除 MCC / 黑名单<textarea id="excludedRules" placeholder="例如 年费、手续费、代扣代缴、部分网付、房产汽车、学校医院等"></textarea></label>
            <label class="wide">当前刷卡策略<textarea id="currentPurchasePlan" placeholder="例如 本月主刷酒店；大额优先账单日刚过；不用来交年费类费用"></textarea></label>
          </div>
        </details>

        <details class="field-group">
          <summary>权益 / 活动 / 自动扣款</summary>
          <div class="form-grid">
            <label>权益重置周期
              <select id="benefitResetCycle">
                <option>未知</option>
                <option>月度</option>
                <option>季度</option>
                <option>半年度</option>
                <option>自然年</option>
                <option>持卡周年</option>
                <option>每4年/多年</option>
              </select>
            </label>
            <label>上次使用权益日期<input id="lastBenefitUsedDate" type="date" /></label>
            <label>是否需报名/激活
              <select id="activationNeeded">
                <option>未知</option>
                <option>不需要</option>
                <option>需要报名</option>
                <option>需要App领取</option>
                <option>需要指定渠道</option>
              </select>
            </label>
            <label>实体卡位置<input id="physicalLocation" placeholder="钱包/抽屉/保险箱/不带出门" /></label>
            <label class="wide">权益清单 / statement credits<textarea id="benefitCredits" placeholder="例如 酒店券、餐饮券、打车券、机场贵宾厅、Global Entry/TSA、保险"></textarea></label>
            <label class="wide">活动关键词<textarea id="campaignTags" placeholder="例如 Visa返利、境外、酒店、携程、满减、需报名"></textarea></label>
            <label class="wide">自动扣款/绑定服务清单<textarea id="autoPayList" placeholder="逐行写：服务名、周期、金额、是否重要、换卡是否要更新"></textarea></label>
            <div class="wide check-grid" data-target="autoPayList">
              <label><input type="checkbox" value="Apple订阅" />Apple订阅</label>
              <label><input type="checkbox" value="微信支付" />微信支付</label>
              <label><input type="checkbox" value="支付宝" />支付宝</label>
              <label><input type="checkbox" value="美团/外卖" />美团/外卖</label>
              <label><input type="checkbox" value="携程/旅行平台" />携程/旅行平台</label>
              <label><input type="checkbox" value="保险扣款" />保险扣款</label>
              <label><input type="checkbox" value="云服务/服务器" />云服务/服务器</label>
              <label><input type="checkbox" value="会员订阅" />会员订阅</label>
              <label><input type="checkbox" value="广告费" />广告费</label>
              <label><input type="checkbox" value="水电物业" />水电物业</label>
            </div>
            <label class="wide">自动还款/还款方式<textarea id="paymentSetup" placeholder="例如 已设自动还款；手动还；绑定借记卡；提醒提前3天"></textarea></label>
          </div>
        </details>

        <details class="field-group">
          <summary>换卡 / 盗刷 / 退款 / 风控</summary>
          <div class="form-grid">
            <label>旧卡尾号<input id="oldLast4" maxlength="4" inputmode="numeric" placeholder="换卡时填写" /></label>
            <label>新卡尾号<input id="newLast4" maxlength="4" inputmode="numeric" placeholder="换卡后填写" /></label>
            <label>换卡原因
              <select id="replacementReason">
                <option>无</option>
                <option>到期换卡</option>
                <option>盗刷/疑似盗刷</option>
                <option>丢失</option>
                <option>损坏</option>
                <option>银行重发</option>
                <option>产品升级/降级</option>
              </select>
            </label>
            <label>异常状态
              <select id="riskStatus">
                <option>无异常</option>
                <option>关注退款</option>
                <option>争议处理中</option>
                <option>疑似盗刷</option>
                <option>已冻结</option>
                <option>需联系银行</option>
              </select>
            </label>
            <label class="wide">退款追踪<textarea id="refundTracking" placeholder="例如 旧卡还有退款；商户、金额、日期、预计入账"></textarea></label>
            <label class="wide">争议/盗刷处理记录<textarea id="disputeTracking" placeholder="例如 发现日期、联系银行、冻结、补卡、临时额度、案件号"></textarea></label>
            <label class="wide">风控/使用限制<textarea id="cardControls" placeholder="例如 境外关闭；线上限额；大额前需打开；不常用需每年刷一次"></textarea></label>
          </div>
        </details>
        <div class="dialog-actions">
          <button class="ghost-btn" value="cancel" type="submit">取消</button>
          <button class="primary-btn" id="saveCardBtn" value="default" type="submit">保存档案</button>
        </div>
      </form>
    </dialog>

    <dialog id="campaignDialog">
      <form method="dialog" class="dialog-form" id="campaignForm">
        <div class="dialog-head">
          <h2 id="campaignDialogTitle">新增活动</h2>
          <button class="icon-btn" value="cancel" type="submit" aria-label="关闭">×</button>
        </div>
        <input type="hidden" id="campaignId" />
        <div class="form-grid">
          <label>活动名称<input id="campaignName" required placeholder="例如 Visa 返利活动" /></label>
          <label>来源<input id="campaignSource" placeholder="Visa / 银行 / 平台" /></label>
          <label>开始日期<input id="campaignStart" type="date" /></label>
          <label>结束日期<input id="campaignEnd" type="date" /></label>
          <label class="wide">适用卡<input id="campaignCards" placeholder="可写银行、卡名、尾号或用途标签" /></label>
          <label class="wide">活动规则<textarea id="campaignRule" placeholder="例如 需报名，满300返30，每卡限一次"></textarea></label>
          <p class="form-hint wide">活动默认不是全局活动，请写清楚适用卡、银行、尾号或卡片活动关键词。</p>
          <label>状态
            <select id="campaignStatus">
              <option>未用</option>
              <option>已报名</option>
              <option>已用</option>
              <option>已过期</option>
            </select>
          </label>
        </div>
        <div class="dialog-actions">
          <button class="ghost-btn" value="cancel" type="submit">取消</button>
          <button class="primary-btn" value="default" type="submit">保存活动</button>
        </div>
      </form>
    </dialog>

    <datalist id="bankOptions">
      <option value="工商银行"></option>
      <option value="建设银行"></option>
      <option value="农业银行"></option>
      <option value="中国银行"></option>
      <option value="交通银行"></option>
      <option value="招商银行"></option>
      <option value="中信银行"></option>
      <option value="浦发银行"></option>
      <option value="民生银行"></option>
      <option value="兴业银行"></option>
      <option value="光大银行"></option>
      <option value="广发银行"></option>
      <option value="平安银行"></option>
      <option value="华夏银行"></option>
      <option value="北京银行"></option>
      <option value="上海银行"></option>
      <option value="江苏银行"></option>
      <option value="宁波银行"></option>
      <option value="南京银行"></option>
      <option value="邮储银行"></option>
      <option value="汇丰银行"></option>
      <option value="花旗银行"></option>
      <option value="渣打银行"></option>
      <option value="东亚银行"></option>
    </datalist>
    <datalist id="holderOptions">
      <option value="本人"></option>
      <option value="家人"></option>
      <option value="公司"></option>
    </datalist>
    <datalist id="cardLevelOptions">
      <option value="普卡"></option>
      <option value="金卡"></option>
      <option value="白金卡"></option>
      <option value="世界卡"></option>
      <option value="世界之极"></option>
      <option value="无限卡"></option>
      <option value="钻石卡"></option>
      <option value="百夫长"></option>
      <option value="黑卡"></option>
      <option value="联名卡"></option>
    </datalist>
    <datalist id="currencyOptions">
      <option value="CNY"></option>
      <option value="USD"></option>
      <option value="HKD"></option>
      <option value="EUR"></option>
      <option value="JPY"></option>
      <option value="人民币+美元"></option>
      <option value="人民币+港币"></option>
    </datalist>
    <datalist id="spendingCurrencyOptions">
      <option value="人民币"></option>
      <option value="美元"></option>
      <option value="港币"></option>
      <option value="欧元"></option>
      <option value="日元"></option>
      <option value="英镑"></option>
      <option value="全币种"></option>
      <option value="多币种"></option>
      <option value="人民币+美元"></option>
      <option value="人民币+港币"></option>
      <option value="美元+欧元"></option>
      <option value="外币卡"></option>
    </datalist>
    <datalist id="cashbackTypeOptions">
      <option value="直接返利"></option>
      <option value="现金返现"></option>
      <option value="账单抵扣"></option>
      <option value="平台券/消费券"></option>
      <option value="航空里程"></option>
      <option value="酒店积分"></option>
      <option value="银行积分等价"></option>
    </datalist>

    <script>
      const script = document.createElement("script");
      script.src = `./app.js?build=${window.APP_BUILD}`;
      document.body.appendChild(script);
    </script>
  </body>
</html>
