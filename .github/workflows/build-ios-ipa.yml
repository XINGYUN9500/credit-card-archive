name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    paths:
      - "ios/**"
      - ".github/workflows/build-ios-ipa.yml"

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd ios
          xcodegen generate --spec project.yml

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project ios/CreditCardArchive.xcodeproj \
            -target CreditCardArchive \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -R build/ios/Build/Products/Release-iphoneos/CreditCardArchive.app build/ipa/Payload/
          cd build/ipa
          zip -r CreditCardArchive-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: credit-card-archive-unsigned-ipa
          path: build/ipa/CreditCardArchive-unsigned.ipa
