name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    paths:
      - "ios/**"
      - ".github/workflows/build-ios-ipa.yml"

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate app icon assets
        run: python3 ios/scripts/make_app_icon.py

      - name: Generate Xcode project
        run: |
          cd ios
          xcodegen generate --spec project.yml

      - name: Build unsigned app
        run: |
          set -o pipefail
          xcodebuild \
            -project ios/CreditCardArchive.xcodeproj \
            -scheme CreditCardArchive \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build 2>&1 | tee build-ios.log

      - name: Inspect app bundle
        run: |
          APP=build/ios/Build/Products/Release-iphoneos/CreditCardArchive.app
          echo "Bundle version:"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c 'Print :UILaunchStoryboardName' "$APP/Info.plist"
          echo "Bundle files:"
          find "$APP" -maxdepth 3 -print | sort
          test -f "$APP/Assets.car"
          find "$APP" -name 'LaunchScreen.storyboardc' -print -quit | grep -q LaunchScreen

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: build-ios.log

      - name: Package IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -R build/ios/Build/Products/Release-iphoneos/CreditCardArchive.app build/ipa/Payload/
          cd build/ipa
          zip -r CreditCardArchive-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: credit-card-archive-unsigned-ipa
          path: build/ipa/CreditCardArchive-unsigned.ipa
